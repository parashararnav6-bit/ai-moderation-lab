name: ai-moderation-lab
version: 1.0.0

tasks:
  - name: "easy_moderation"
    description: "Clear-cut content moderation cases"
    dataset:
      path: "data/easy.json"
    grader:
      type: "custom"
      script: "inference.py"
      metric: "accuracy"
    
  - name: "medium_moderation"
    description: "Borderline content moderation cases"
    dataset:
      path: "data/medium.json"
    grader:
      type: "custom"
      script: "inference.py"
      metric: "accuracy"
    
  - name: "hard_moderation"
    description: "Complex safety-critical cases"
    dataset:
      path: "data/hard.json"
    grader:
      type: "custom"
      script: "inference.py"
      metric: "accuracy"
